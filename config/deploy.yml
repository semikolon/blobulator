<% require "dotenv"; Dotenv.overload(".env") %>
# Blobulator Kamal Deployment Configuration
# Target: Dell Optiplex 7010 / Darwin (blobulator.fredrikbranstrom.se, voidulator.fredrikbranstrom.se)
# Architecture: kamal-proxy (TLS/LE) → nginx container (static files)

service: blobulator

# Container image name
image: blobulator

# Deploy to Darwin (router at .1)
servers:
  web:
    hosts:
      - 192.168.4.1

# Proxy configuration — kamal-proxy handles TLS via Let's Encrypt
proxy:
  ssl: true
  host: blobulator.fredrikbranstrom.se,voidulator.fredrikbranstrom.se
  app_port: 80  # nginx inside container listens on 80
  forward_headers: true

# Knot self-hosted registry on Dell
registry:
  server: registry.fredrikbranstrom.se
  username: admin
  password: "<%= ENV['KNOT_REGISTRY_PASSWORD'] %>"

# Builder configuration — remote builder on Darwin, native AMD64
builder:
  arch: amd64
  remote: ssh://fredrik@192.168.4.1
  cache:
    type: registry
    options: mode=max

# Environment variables (minimal - just timezone)
env:
  clear:
    TZ: Europe/Stockholm

# SSH configuration
ssh:
  user: fredrik

# Rolling deploy
boot:
  limit: 1
  wait: 5

# Aliases
aliases:
  logs: app logs -f
